# Automated, Conventional-Commits-driven releases.
#
# On every push to main, release-please reads the commit messages since the
# last release and maintains a rolling "Release PR" that bumps package.json +
# .release-please-manifest.json and regenerates CHANGELOG.md. Merging that PR is
# what cuts a release: the merge commit (with the bumped version) is what Vercel
# deploys, and release-please then tags `vX.Y.Z` and creates a GitHub Release.
#
# Version is decided from commit types:
#   fix:        → patch   (1.0.0 → 1.0.1)
#   feat:       → minor   (1.0.0 → 1.1.0)
#   feat!: / "BREAKING CHANGE:" in body → major (1.0.0 → 2.0.0)
#
# One-time repo setting required for the PR to be created with the default
# token: Settings → Actions → General → Workflow permissions →
#   ✓ "Read and write permissions"
#   ✓ "Allow GitHub Actions to create and approve pull requests"
name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
